name: Build macOS and Windows

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build macOS
        run: pnpm run build:mac
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/**
            dist-electron/**
            release/**

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Windows
        run: pnpm run build:win
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/**
            dist-electron/**
            release/**

  publish-release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: ./artifacts/macos
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./artifacts/windows
      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p release-assets
          for file in artifacts/macos/release/*.dmg; do
            cp -n "$file" release-assets/
          done
          for file in artifacts/windows/release/*.exe; do
            cp -n "$file" release-assets/
          done
          rm -f \
            release-assets/elevate.exe \
            release-assets/ffmpeg.exe \
            release-assets/ffprobe.exe
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.dmg
            release-assets/*.exe
